<svg width="900" height="160" viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <clipPath id="avatar-clip">
      <circle cx="72" cy="80" r="36"/>
    </clipPath>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card bg -->
  <rect width="900" height="160" fill="url(#bg2)" rx="12"/>
  <rect width="900" height="160" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" rx="12"/>

  <!-- Avatar circle bg -->
  <circle cx="72" cy="80" r="38" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Avatar placeholder — silhouette -->
  <circle cx="72" cy="70" r="16" fill="rgba(255,255,255,0.15)" clip-path="url(#avatar-clip)"/>
  <ellipse cx="72" cy="104" rx="26" ry="18" fill="rgba(255,255,255,0.12)" clip-path="url(#avatar-clip)"/>

  <!-- Online dot -->
  <circle cx="102" cy="108" r="6" fill="#111"/>
  <circle cx="102" cy="108" r="5" fill="#4ade80"/>

  <!-- Name -->
  <text x="130" y="65" font-family="'Courier New', monospace" font-size="22" fill="#ffffff" font-weight="700" letter-spacing="1">MIzeri</text>

  <!-- Discord-style badge row -->
  <rect x="130" y="74" width="110" height="20" fill="rgba(255,255,255,0.05)" rx="4" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="140" y="88" font-family="'Courier New', monospace" font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="1">BACKEND DEV</text>

  <!-- Status -->
  <text x="130" y="112" font-family="'Courier New', monospace" font-size="11" fill="rgba(255,255,255,0.3)">currently doing nothing</text>

  <!-- Separator -->
  <line x1="130" y1="126" x2="500" y2="126" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Info row -->
  <!-- Age -->
  <text x="130" y="148" font-family="'Courier New', monospace" font-size="11" fill="rgba(255,255,255,0.3)" letter-spacing="1">Age</text>
  <text x="160" y="148" font-family="'Courier New', monospace" font-size="11" fill="rgba(255,255,255,0.8)">??</text>

  <!-- Location -->
  <text x="220" y="148" font-family="'Courier New', monospace" font-size="11" fill="rgba(255,255,255,0.3)" letter-spacing="1">📍</text>
  <text x="238" y="148" font-family="'Courier New', monospace" font-size="11" fill="rgba(255,255,255,0.8)">Russia</text>

  <!-- Focus -->
  <text x="320" y="148" font-family="'Courier New', monospace" font-size="11" fill="rgba(255,255,255,0.3)" letter-spacing="1">Focus</text>
  <text x="363" y="148" font-family="'Courier New', monospace" font-size="11" fill="rgba(255,255,255,0.8)">Backend · Systems</text>

  <!-- Right side: social icons area -->
  <!-- YouTube icon box -->
  <rect x="720" y="64" width="40" height="32" fill="rgba(255,255,255,0.05)" rx="8" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="740" y="85" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.5)" text-anchor="middle">▶</text>

  <!-- Telegram icon box -->
  <rect x="768" y="64" width="40" height="32" fill="rgba(255,255,255,0.05)" rx="8" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="788" y="85" font-family="sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle">✈</text>

  <!-- Discord icon box -->
  <rect x="816" y="64" width="40" height="32" fill="rgba(255,255,255,0.05)" rx="8" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="836" y="85" font-family="sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle">◈</text>
</svg>
