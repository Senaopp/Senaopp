<svg width="900" height="100" viewBox="0 0 900 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
  </defs>

  <rect width="900" height="100" fill="url(#bg6)" rx="12"/>
  <rect width="900" height="100" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" rx="12"/>

  <!-- Music cover placeholder -->
  <rect x="20" y="18" width="64" height="64" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Music note icon -->
  <text x="52" y="58" font-family="sans-serif" font-size="26" fill="rgba(255,255,255,0.2)" text-anchor="middle">♪</text>

  <!-- Track info -->
  <text x="100" y="40" font-family="'Courier New', monospace" font-size="14" fill="#ffffff" font-weight="600">???</text>
  <text x="100" y="58" font-family="'Courier New', monospace" font-size="11" fill="rgba(255,255,255,0.35)">unknown artist</text>

  <!-- Progress bar -->
  <rect x="100" y="68" width="540" height="3" rx="2" fill="rgba(255,255,255,0.08)"/>
  <rect x="100" y="68" width="180" height="3" rx="2" fill="rgba(255,255,255,0.5)"/>
  <!-- Dot on progress -->
  <circle cx="280" cy="70" r="4" fill="#ffffff"/>

  <!-- Time -->
  <text x="100" y="85" font-family="'Courier New', monospace" font-size="10" fill="rgba(255,255,255,0.25)">0:02</text>
  <text x="636" y="85" font-family="'Courier New', monospace" font-size="10" fill="rgba(255,255,255,0.25)" text-anchor="end">3:37</text>

  <!-- Controls -->
  <text x="720" y="58" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,0.3)" text-anchor="middle">⏮</text>
  <circle cx="760" cy="50" r="16" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="760" y="57" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.8)" text-anchor="middle">▶</text>
  <text x="800" y="58" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,0.3)" text-anchor="middle">⏭</text>
</svg>
