<svg width="900" height="60" viewBox="0 0 900 60" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="60" fill="#0d0d0d" rx="12"/>
  <rect width="900" height="60" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" rx="12"/>

  <!-- Left pulse -->
  <circle cx="30" cy="30" r="5" fill="rgba(255,255,255,0.3)">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Right pulse -->
  <circle cx="870" cy="30" r="5" fill="rgba(255,255,255,0.3)">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <text x="450" y="34" font-family="'Courier New', monospace" font-size="11" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="4">⚠ EXTERNAL CONNECTION DETECTED ⚠</text>
</svg>
