<svg width="900" height="180" viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
  </defs>

  <!-- Card -->
  <rect width="900" height="180" fill="url(#card-bg)" rx="12"/>
  <rect width="900" height="180" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" rx="12"/>

  <!-- Top bar -->
  <rect width="900" height="36" fill="rgba(255,255,255,0.03)" rx="12"/>
  <rect width="900" height="36" y="0" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0"/>
  <rect width="900" height="1" y="36" fill="rgba(255,255,255,0.06)"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="18" r="5" fill="#ff5f57" opacity="0.7"/>
  <circle cx="38" cy="18" r="5" fill="#febc2e" opacity="0.7"/>
  <circle cx="54" cy="18" r="5" fill="#28c840" opacity="0.7"/>

  <!-- Tab label -->
  <text x="450" y="23" font-family="'Courier New', monospace" font-size="11" fill="rgba(255,255,255,0.25)" text-anchor="middle" letter-spacing="2">boot.log — terminal</text>

  <!-- Terminal lines -->
  <text x="30" y="68" font-family="'Courier New', monospace" font-size="12" fill="rgba(255,255,255,0.3)">$</text>
  <text x="44" y="68" font-family="'Courier New', monospace" font-size="12" fill="rgba(255,255,255,0.55)">initializing system...</text>
  <text x="700" y="68" font-family="'Courier New', monospace" font-size="11" fill="#4ade80" opacity="0.8">[  OK  ]</text>

  <text x="30" y="90" font-family="'Courier New', monospace" font-size="12" fill="rgba(255,255,255,0.3)">$</text>
  <text x="44" y="90" font-family="'Courier New', monospace" font-size="12" fill="rgba(255,255,255,0.55)">loading identity: <tspan fill="rgba(255,255,255,0.9)" font-weight="600">MIzeri</tspan></text>
  <text x="700" y="90" font-family="'Courier New', monospace" font-size="11" fill="#4ade80" opacity="0.8">[  OK  ]</text>

  <text x="30" y="112" font-family="'Courier New', monospace" font-size="12" fill="rgba(255,255,255,0.3)">$</text>
  <text x="44" y="112" font-family="'Courier New', monospace" font-size="12" fill="rgba(255,255,255,0.55)">mounting core: <tspan fill="rgba(255,255,255,0.9)">Java · Python · PostgreSQL</tspan></text>
  <text x="700" y="112" font-family="'Courier New', monospace" font-size="11" fill="#4ade80" opacity="0.8">[  OK  ]</text>

  <text x="30" y="134" font-family="'Courier New', monospace" font-size="12" fill="rgba(255,255,255,0.3)">$</text>
  <text x="44" y="134" font-family="'Courier New', monospace" font-size="12" fill="rgba(255,255,255,0.55)">signal check...</text>
  <text x="700" y="134" font-family="'Courier New', monospace" font-size="11" fill="#facc15" opacity="0.8">[ WARN ]</text>

  <text x="30" y="156" font-family="'Courier New', monospace" font-size="12" fill="rgba(255,255,255,0.3)">$</text>
  <text x="44" y="156" font-family="'Courier New', monospace" font-size="12" fill="rgba(255,255,255,0.55)">status: <tspan fill="#ffffff" font-weight="600">ONLINE</tspan> — connection not terminated<tspan fill="rgba(255,255,255,0.4)">  █</tspan></text>
</svg>
